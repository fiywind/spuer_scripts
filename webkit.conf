^https?://[^/]+/exploit[s]?/ url reject


# ═══════════════════════════════════════════════════════════════
# 层三：请求级智能过滤（无需 MitM）
# 通过 UA + Referer + URL 模式识别"可能携带恶意 JS 的请求"
# 仅对命中可疑条件的请求调用脚本做轻量检查
# 正常浏览（Apple域名、主流CDN、常规App请求）全部跳过
# ═══════════════════════════════════════════════════════════════

# 排除已知安全域名后的 HTML/JS 请求，进入请求阶段检测
# 脚本内部会进一步判断是否可疑，不可疑则立即放行（零开销）
^https?://(?!.*\.apple\.com)(?!.*\.icloud\.com)(?!.*\.mzstatic\.com)(?!.*cdn\.jsdelivr\.net)(?!.*unpkg\.com)(?!.*cdnjs\.cloudflare\.com)(?!.*ajax\.googleapis\.com)(?!.*\.gstatic\.com)(?!.*\.cloudfront\.net)(?!.*\.akamai\.net)(?!.*\.fastly\.net)(?!.*\.baidu\.com)(?!.*\.qq\.com)(?!.*\.weixin\.qq\.com)(?!.*\.taobao\.com)(?!.*\.tmall\.com)(?!.*\.alipay\.com)(?!.*\.163\.com)(?!.*\.126\.com)(?!.*\.jd\.com)[^/]+.*\.(html?|js)(\?.*)?$ url script-request-header https://raw.githubusercontent.com/YOUR_GITHUB_USER/webkit-shield/main/webkit-request-filter.js


# ═══════════════════════════════════════════════════════════════
# 层四：响应体深度扫描（精准触发）
# 关键设计：此层仅对请求层标记为"可疑"的域名启用
#
# 实现方式：
#   - 请求层脚本检测到可疑特征时，将该域名记录到 $prefs
#   - 响应层脚本先检查 $prefs 中是否有该域名标记
#   - 有标记 → 扫描响应体 | 无标记 → 立即放行
#   - 标记有效期 5 分钟，过期自动清除
#
# 结果：99%+ 的正常请求根本不会走到响应体扫描
# MitM hostname 只需包含"被标记为可疑的域名"，而非所有域名
# ═══════════════════════════════════════════════════════════════

^https?://(?!.*\.apple\.com)(?!.*\.icloud\.com)(?!.*cdn\.jsdelivr\.net)(?!.*unpkg\.com)(?!.*cdnjs\.cloudflare\.com)[^/]+.*\.(html?|js)(\?.*)?$ url script-response-body https://raw.githubusercontent.com/YOUR_GITHUB_USER/webkit-shield/main/webkit-exploit-detector.js

hostname = *.xyz, *.icu, *.top, *.tk, *.ml, *.ga, *.pw, *.buzz, *.club, *.cf, *.cc, *.me, *.online, html5test.com
