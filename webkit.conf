# WebKit-Shield v2.1 — QuantumultX Snippet
# ================================================================
# 防御 Coruna / DarkSword WebKit RCE exploit kit
# 基于 lockdown tweak (roothide) 情报构建


# ==================== 使用说明 ====================
#
# 【双模式切换】
# 本模块支持两种防御模式，通过 URL 参数切换：
#
# 1. 精准模式（默认，推荐）
#    - 仅对被标记为可疑的域名进行深度扫描 + API 硬化
#    - 99%+ 正常请求零开销
#    - MitM hostname 只需覆盖可疑 TLD
#
# 2. 全量模式（高级用户）
#    - 对所有 HTML 页面注入 API 硬化代码
#    - 需要在 MitM hostname 中添加 *
#    - 耗电量增加，但防御更全面
#
# 切换方式：
# - URL 参数: webkit-shield-core.js?mode=full
# - $prefs 开关: ws2_mode = "full"
#
# ==================== 文件结构 ====================
#
# v2.2 整合为 2 个文件：
# 1. webkit-request-filter.js  - 请求层标记可疑域名
# 2. webkit-shield-core.js     - 响应体扫描 + API 硬化（整合版）
#
# 旧版 3 个文件已废弃：
# - webkit-exploit-detector.js（已合并到 core）
# - webkit-runtime-shield.js（已合并到 core）
#
# ==================================================

# 【层一】IOC 域名直接拦截 - 已知恶意域名
DOMAIN-SUFFIX,b27.icu,REJECT
DOMAIN-SUFFIX,7aac.gov.ua,REJECT
DOMAIN-SUFFIX,cloudflare-cdn.top,REJECT
DOMAIN-SUFFIX,github-usercontent.com,REJECT
DOMAIN-SUFFIX,update-microsoft.top,REJECT
DOMAIN-SUFFIX,security-check.icu,REJECT
DOMAIN-SUFFIX,apple-verify.xyz,REJECT

# 【层二】URL 路径特征拦截 - 可疑文件路径
URL-REGEX,^https?://[^/]+/[a-f0-9]{40}\.js$,REJECT-TINYGIF
URL-REGEX,^https?://[^/]+/51la-ll\.js$,REJECT-TINYGIF
URL-REGEX,^https?://[^/]+/exploit.*\.js$,REJECT-TINYGIF
URL-REGEX,^https?://[^/]+/payload.*\.bin$,REJECT-TINYGIF
URL-REGEX,^https?://[^/]+/corona.*\.js$,REJECT-TINYGIF
URL-REGEX,^https?://[^/]+/darksword.*\.js$,REJECT-TINYGIF

# 【层三】请求层标记 - 可疑域名标记（用于层四精准扫描）
^https?://([a-z0-9-]+\.)*(xyz|icu|top|tk|ml|ga|cf|buzz|cyou|monster|rest) url script-request-header https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-request-filter.js
^https?://webkit-shield-test\.justlcd\.workers\.dev url script-response-body https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-shield-core.js

# 【层四】响应体扫描 + API 硬化（精准模式 - 默认）
# 仅扫描被层三标记的可疑域名
^https?://([a-z0-9-]+\.)*(xyz|icu|top|tk|ml|ga|cf|buzz|cyou|monster|rest) url script-response-body https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-shield-core.js

# 【层四】响应体扫描 + API 硬化（全量模式 - 可选）
# 取消下面一行的注释以启用全量模式（需要在 MitM hostname 中添加 *）
# ^https?://[^/]+.*\.(html?)(\?.*)?$ url script-response-body https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-shield-core.js?mode=full

# ═══════════════════════════════════════════════════════════════
# MitM hostname 配置
# ═══════════════════════════════════════════════════════════════
#
# 【重要】以下 hostname 配置需要添加到 QX 配置文件的 [mitm] 部分
# 不要复制到本 snippet 文件中（snippet 仅支持 rewrite 规则）
#
# 在 QX 配置文件的 [mitm] → hostname 行末尾追加以下域名：
#（注意：QX 配置文件只能有一行 hostname=，多个域名用逗号分隔）
#
# hostname = 你原有的域名, *.xyz, *.icu, *.top, *.tk, *.ml, *.ga, *.pw, *.buzz, *.club, *.cf, *.cc, *.me, *.online
#
# 策略说明：
#   - 仅覆盖 exploit kit 高发 TLD（廉价/免费域名）
#   - 不覆盖 *.com / *.net / *.org（避免对海量正常 HTTPS 做 MitM 解密）
#   - 已知 IOC 域名由层一 REJECT 规则拦截，不依赖 MitM
#   - 主流站点由层三白名单过滤，即使 MitM 覆盖也不会触发层四扫描


hostname = *.xyz, *.icu, *.top, *.tk, *.ml, *.ga, *.pw, *.buzz, *.club, *.cf, *.cc, *.me, *.online, html5test.com, *.workers.dev, webkit-shield-test.justlcd.workers.dev
