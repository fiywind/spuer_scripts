# WebKit-Shield v2.1 — QuantumultX Snippet
# ================================================================
# 防御 Coruna / DarkSword WebKit RCE exploit kit
# 基于 lockdown tweak (roothide) 情报构建
#
# 设计理念：
#   - 层一/层二：纯规则匹配，零性能开销，无需 MitM
#   - 层三：request-header 脚本，仅处理可疑请求，无需 MitM
#   - 层四：response-body 脚本，仅对可疑响应扫描，需 MitM 但范围极小
#   - 层五：response-body 脚本，向 HTML 注入运行时 API 硬化代码，需 MitM
#   - 所有层协同工作，正常浏览完全无感知
# 
# ================================================================
# !author=fiywind
# Update:2026-04-09

# ═══════════════════════════════════════════════════════════════
# 层一：IOC 域名直接拦截
# 已知 Coruna C2 + DarkSword 水坑域名
# 特点：不需要 MitM，零延迟，100% 精准
# ═══════════════════════════════════════════════════════════════

^https?://b27\.icu url reject
^https?://[^/]*\.b27\.icu url reject
^https?://ai-scorepredict\.com url reject
^https?://fgr1w2gnsdvsb\.xyz url reject
^https?://remotexxxyyy\.com url reject
^https?://7aac\.gov\.ua url reject
^https?://novosti\.dn\.ua url reject


# ═══════════════════════════════════════════════════════════════
# 层二：恶意 URL 路径特征拦截
# Coruna 投递载体的典型路径模式
# 特点：不需要 MitM，路径正则匹配，极低误判
# ═══════════════════════════════════════════════════════════════

# 51la 统计脚本伪装投递载体（Coruna 常用）
^https?://[^/]+/51la-ll\.js url reject
# Coruna 水坑投递页面
^https?://[^/]+/static/analytics\.html url reject
# SHA1 命名的 payload 文件（40位十六进制字符 .js）
^https?://[^/]+/[0-9a-f]{40}\.js url reject
# exploit kit 通用投递路径
^https?://[^/]+/exploit[s]?/ url reject


# ═══════════════════════════════════════════════════════════════
# 层三：请求级智能过滤（无需 MitM）
# 通过 UA + Referer + URL 模式识别"可能携带恶意 JS 的请求"
# 仅对命中可疑条件的请求调用脚本做轻量检查
# 正常浏览（Apple域名、主流CDN、常规App请求）全部跳过
# ═══════════════════════════════════════════════════════════════

# 排除已知安全域名后的 HTML/JS 请求，进入请求阶段检测
# 脚本内部会进一步判断是否可疑，不可疑则立即放行（零开销）
^https?://(?!.*\.apple\.com)(?!.*\.icloud\.com)(?!.*\.mzstatic\.com)(?!.*\.meituan\.net)(?!.*\.chelaile\.net)(?!.*cdn\.jsdelivr\.net)(?!.*unpkg\.com)(?!.*cdnjs\.cloudflare\.com)(?!.*ajax\.googleapis\.com)(?!.*\.gstatic\.com)(?!.*\.cloudfront\.net)(?!.*\.akamai\.net)(?!.*\.fastly\.net)(?!.*\.baidu\.com)(?!.*\.qq\.com)(?!.*\.weixin\.qq\.com)(?!.*\.taobao\.com)(?!.*\.tmall\.com)(?!.*\.alipay\.com)(?!.*\.163\.com)(?!.*\.126\.com)(?!.*\.jd\.com)[^/]+.*\.(html?|js)(\?.*)?$ url script-request-header https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-request-filter.js


# ═══════════════════════════════════════════════════════════════
# 层四+层五：响应体深度扫描 + 运行时 API 硬化（精准触发）
# 关键设计：此层仅对请求层标记为"可疑"的域名启用
#
# 实现方式：
#   - 请求层脚本检测到可疑特征时，将该域名记录到 $prefs
#   - 响应层脚本先检查 $prefs 中是否有该域名标记
#   - 有标记 → 扫描响应体 + 对 HTML 页面注入运行时 API 硬化代码
#   - 无标记 → 立即放行
#   - 标记有效期 5 分钟，过期自动清除
#
# v2.1 新增：对可疑域名的 HTML 页面自动注入运行时 API 硬化代码：
#   • WebAssembly 封堵（阻断 JIT 提权路径）
#   • SharedArrayBuffer 封堵（防止侧信道攻击）
#   • performance.now() 降精度（削弱时间侧信道）
#   • SharedWorker 封堵 + 传感器 API 封堵
#   使用 Object.defineProperty 封堵，防止被 exploit 脚本恢复
#
# 结果：99%+ 的正常请求根本不会走到响应体扫描
# MitM hostname 只需包含 exploit kit 高发 TLD，不需全覆盖 .com/.net
# ═══════════════════════════════════════════════════════════════

^https?://(?!.*\.apple\.com)(?!.*\.icloud\.com)(?!.*cdn\.jsdelivr\.net)(?!.*unpkg\.com)(?!.*cdnjs\.cloudflare\.com)[^/]+.*\.(html?|js)(\?.*)?$ url script-response-body https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-exploit-detector.js


# ═══════════════════════════════════════════════════════════════
# 【可选】层五独立模式：全量 HTML 运行时 API 硬化
# ═══════════════════════════════════════════════════════════════
#
# 如果你想对所有 HTML 页面都注入 API 硬化代码（而非仅可疑域名），
# 可以取消下面这行注释。
#
# ⚠️ 启用此模式需要在 MitM hostname 中添加 *（匹配所有域名），
#   会导致圈X对所有 HTTPS 做 MitM 解密，耗电量显著增加！
#   仅建议追求极致安全的高级用户启用。
#
# 启用步骤：
#   1. 取消下面这行注释
#   2. MitM hostname 末尾追加 *, *.com, *.net, *.org, *.io
#   3. 重启圈X
#
# ^https?://[^/]+.*\.(html?)(\?.*)?$ url script-response-body https://raw.githubusercontent.com/fiywind/spuer_scripts/refs/heads/main/webkit-runtime-shield.js


# ═══════════════════════════════════════════════════════════════
# MitM hostname 配置
# ═══════════════════════════════════════════════════════════════
#
# 【重要】以下 hostname 配置需要添加到 QX 配置文件的 [mitm] 部分
# 不要复制到本 snippet 文件中（snippet 仅支持 rewrite 规则）
#
# 在 QX 配置文件的 [mitm] → hostname 行末尾追加以下域名：
#（注意：QX 配置文件只能有一行 hostname=，多个域名用逗号分隔）
#
# hostname = 你原有的域名, *.xyz, *.icu, *.top, *.tk, *.ml, *.ga, *.pw, *.buzz, *.club, *.cf, *.cc, *.me, *.online
#
# 策略说明：
#   - 仅覆盖 exploit kit 高发 TLD（廉价/免费域名）
#   - 不覆盖 *.com / *.net / *.org（避免对海量正常 HTTPS 做 MitM 解密）
#   - 已知 IOC 域名由层一 REJECT 规则拦截，不依赖 MitM
#   - 主流站点由层三白名单过滤，即使 MitM 覆盖也不会触发层四扫描


hostname = *.xyz, *.icu, *.top, *.tk, *.ml, *.ga, *.pw, *.buzz, *.club, *.cf, *.cc, *.me, *.online, html5test.com, *.workers.dev, webkit-shield-test.justlcd.workers.dev

